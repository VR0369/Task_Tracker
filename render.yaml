# Render Blueprint — one Docker web service that serves the API and the SPA.
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
#
# Uses a real MongoDB (Atlas), live weather (WeatherAPI — keyed, reliable on
# Render's shared IP), live keyless on-this-day (byabbe.se) + quotes (ZenQuotes),
# and real Google Sign-In. On Apply, Render prompts for the three sync:false
# secrets: MONGO_URL, WEATHERAPI_API_KEY, and GOOGLE_CLIENT_ID.
services:
  - type: web
    name: orbit-task-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      # --- Database (MongoDB Atlas) ---
      - key: MOCK_DB
        value: "false"
      # Set in the Render dashboard, not in git. Example:
      #   mongodb+srv://<user>:<password>@cluster0.xxxxx.mongodb.net/?retryWrites=true&w=majority
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: TaskTracker
      # Seeds demo data once on first boot (idempotent). Set false for empty DB.
      - key: SEED_ON_STARTUP
        value: "true"
      # --- Weather ---
      # MOCK_WEATHER=false turns live weather on. On Render's shared IP, keyless
      # Open-Meteo gets rate-limited (429), so set WEATHERAPI_API_KEY (free key
      # from https://www.weatherapi.com/) in the dashboard — its per-key quota is
      # reliable here. Open-Meteo stays as the keyless fallback.
      - key: MOCK_WEATHER
        value: "false"
      - key: WEATHERAPI_API_KEY
        sync: false
      # --- On This Day (byabbe.se) + Quotes (ZenQuotes) — live, keyless ---
      - key: MOCK_HISTORY
        value: "false"
      - key: MOCK_QUOTES
        value: "false"
      # --- Auth (real Google Sign-In) ---
      # Set GOOGLE_CLIENT_ID in the dashboard (create an OAuth 2.0 Client ID at
      # https://console.cloud.google.com/apis/credentials) AND add this service's
      # public URL to that client's "Authorized JavaScript origins". The Google
      # Identity Services token flow needs only the Client ID — no secret, no
      # redirect URI. Flip MOCK_AUTH back to "true" to restore the dev login.
      - key: MOCK_AUTH
        value: "false"
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Render generates a strong secret and keeps it stable across deploys.
      - key: JWT_SECRET
        generateValue: true
