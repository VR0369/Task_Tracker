# Render Blueprint — one Docker web service that serves the API and the SPA.
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
#
# Uses a real MongoDB (Atlas) for persistence. Auth/weather/history stay mocked,
# so the only credential you must supply is MONGO_URL. Render prompts for it on
# Apply (sync: false) and keeps it out of git.
services:
  - type: web
    name: orbit-task-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      # --- Database (MongoDB Atlas) ---
      - key: MOCK_DB
        value: "false"
      # Set in the Render dashboard, not in git. Example:
      #   mongodb+srv://<user>:<password>@cluster0.xxxxx.mongodb.net/?retryWrites=true&w=majority
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: TaskTracker
      # Seeds demo data once on first boot (idempotent). Set false for empty DB.
      - key: SEED_ON_STARTUP
        value: "true"
      # --- Weather (Open-Meteo, keyless) ---
      # Live weather via Open-Meteo needs no API key. MOCK_WEATHER=false turns
      # it on; if the provider is unreachable it falls back to mock automatically.
      - key: MOCK_WEATHER
        value: "false"
      # --- Still mocked (no external keys needed) ---
      - key: MOCK_AUTH
        value: "true"
      - key: MOCK_HISTORY
        value: "true"
      # Render generates a strong secret and keeps it stable across deploys.
      - key: JWT_SECRET
        generateValue: true
